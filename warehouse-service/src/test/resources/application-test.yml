spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Artemis auto-config is excluded by @SpringBootTest properties on AbstractIntegrationTest;
  # tests provide a mock JmsTemplate / ConnectionFactory.

idempiere:
  events:
    warehouse-topic: warehouse.events

logging:
  level:
    com.corestory.idempiere: DEBUG
