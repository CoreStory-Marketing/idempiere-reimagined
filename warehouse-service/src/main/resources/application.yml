spring:
  application:
    name: warehouse-service
  datasource:
    url: jdbc:postgresql://localhost:5443/warehouse
    username: warehouse
    password: warehouse
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

server:
  port: 8083
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

idempiere:
  events:
    warehouse-topic: warehouse.events

logging:
  level:
    root: INFO
    com.corestory.idempiere: DEBUG
