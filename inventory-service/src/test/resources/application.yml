spring:
  datasource:
    url: jdbc:h2:mem:inventory;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false
  artemis:
    mode: embedded
    broker-url: vm://0
    embedded:
      enabled: true
      persistent: false

idempiere:
  events:
    orders-topic: orders.events
    inventory-topic: inventory.events
  reservation:
    ttl-hours: 24
    expiry-job-cron: "0 */15 * * * *"

logging:
  level:
    root: WARN
    com.corestory.idempiere: INFO
