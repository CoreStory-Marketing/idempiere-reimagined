spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Artemis auto-config is excluded in tests; mocked JmsTemplate / ConnectionFactory provided.
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          starttls:
            enable: false
          auth: false

idempiere:
  events:
    shipments-topic: shipments.events
    orders-topic: orders.events
    notifications-topic: notifications.events
  email:
    from: no-reply@idempiere-reimagined.local
    default-language: en

logging:
  level:
    com.corestory.idempiere: DEBUG
