spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: orders
          uri: ${ORDERS_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/orders/**,/customers/**,/payment-terms/**,/price-lists/**
        - id: inventory
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/inventory/**,/products/**,/reservations/**,/warehouses/**,/locators/**,/uoms/**,/attribute-sets/**
        - id: warehouse
          uri: ${WAREHOUSE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/receipts/**,/picks/**,/transfer-orders/**,/vendors/**,/zones/**,/aisles/**
        - id: shipping
          uri: ${SHIPPING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/shipments/**,/carriers/**,/packages/**,/tracking-events/**
        - id: notifications
          uri: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/notifications/**,/email-templates/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: ["GET","POST","PUT","DELETE","PATCH","OPTIONS"]
            allowed-headers: "*"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus

idempiere:
  jwt:
    signing-key: "demo-only-not-for-prod-this-is-a-very-long-static-signing-key-32bytes-min"
    issuer: "idempiere-reimagined"
    ttl-minutes: 60
  demo-user:
    username: admin
    password: admin

logging:
  level:
    root: INFO
    com.corestory.idempiere: DEBUG
